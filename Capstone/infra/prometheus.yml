# prometheus.yml — scrapes the FIAA app metrics endpoint.
# The app exposes Prometheus metrics on :8000/metrics (see monitoring/metrics.py).

global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: insightflow
    metrics_path: /metrics
    static_configs:
      # host.docker.internal lets the Prometheus container reach the app
      # service running on the Docker host / sibling container.
      - targets: ["host.docker.internal:8000"]
